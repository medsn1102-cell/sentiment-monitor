name: 舆情监控定时任务

# 并发控制：防止重复执行
concurrency:
  group: sentiment-monitor
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 2 * * *'  # 北京时间10:00
    - cron: '0 7 * * *'  # 北京时间15:00
  workflow_dispatch:

jobs:
  sentiment-monitor:
    # ✅ 核心修改：使用国内服务器运行（解决海外无法访问问题）
    runs-on: ubuntu-latest
    # 国内公共Runner（火山引擎/阿里云，免费可用）
    runs-on: [self-hosted, linux, x64, cn]
    timeout-minutes: 15
    
    steps:
      - name: 执行舆情监控API调用
        shell: bash
        run: |
          set -euo pipefail
          
          echo "=========================================="
          echo "任务开始：$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          echo "=========================================="
          
          # 调用国内API（国内Runner秒连）
          response=$(curl -s -X POST "https://ymrbm3nqxt.coze.site/run" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.COZE_API_TOKEN }}" \
            -d '{"messages": [{"role": "user", "content": "开始舆情监控"}]}' \
            --max-time 120 \
            --retry 2 \
            --retry-delay 3)
          
          echo -e "\nAPI 响应："
          echo "$response" | head -150
          
          # 错误校验
          if echo "$response" | grep -q -E '"error"|failed|error_code'; then
            echo -e "\n❌ 任务失败"
            exit 1
          fi
          
          echo -e "\n✅ 任务完成：$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
