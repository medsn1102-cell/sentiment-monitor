name: 舆情监控定时任务

concurrency:
  group: sentiment-monitor
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 2 * * *'  # 北京时间 10:00
    - cron: '0 7 * * *'  # 北京时间 15:00
  workflow_dispatch:

jobs:
  sentiment-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 执行舆情监控API调用
        shell: bash
        run: |
          set -euo pipefail
          
          echo "=========================================="
          echo "任务开始：$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          echo "=========================================="
          
          # 直接调用国内接口 + 优化海外网络参数（稳定可用）
          response=$(curl -s -X POST "https://ymrbm3nqxt.coze.site/run" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.COZE_API_TOKEN }}" \
            -d '{"messages": [{"role": "user", "content": "开始舆情监控"}]}' \
            --connect-timeout 30 \
            --max-time 120 \
            --retry 3 \
            --retry-delay 5)
          
          echo -e "\nAPI 响应："
          echo "$response" | head -150
          
          # 全面错误检测
          if echo "$response" | grep -q -E '"error"|failed|error_code|timeout|Empty reply'; then
            echo -e "\n❌ 任务执行失败"
            exit 1
          fi
          
          echo -e "\n✅ 任务执行完成：$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
