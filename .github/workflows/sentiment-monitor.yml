name: 舆情监控定时任务

on:
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  sentiment-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 运行任务
        run: |
          echo "任务开始"
          curl -X POST "https://ymrbm3nqxt.coze.site/run" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.COZE_API_TOKEN }}" \
            -d '{"messages": [{"role": "user", "content": "开始舆情监控"}]}' \
            --connect-timeout 5 --max-time 10
          echo "任务结束"
