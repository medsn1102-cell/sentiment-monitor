name: 舆情监控定时任务

# 并发控制：防止重复执行
concurrency:
  group: sentiment-monitor
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 2 * * *'  # 北京时间10:00
    - cron: '0 7 * * *'  # 北京时间15:00
  workflow_dispatch:

jobs:
  sentiment-monitor:
    # ✅ 只保留 1 次 runs-on，修复语法错误！
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 执行舆情监控API调用
        shell: bash
        run: |
          set -euo pipefail
          
          echo "=========================================="
          echo "任务开始：$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          echo "=========================================="
          
          # ✅ 解决海外服务器访问国内接口超时问题
          response=$(curl -s -X POST "https://api.allorigins.wk/raw?url=https://ymrbm3nqxt.coze.site/run" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.COZE_API_TOKEN }}" \
            -d '{"messages": [{"role": "user", "content": "开始舆情监控"}]}' \
            --max-time 120 \
            --retry 2 \
            --retry-delay 3)
          
          echo -e "\nAPI 响应："
          echo "$response" | head -150
          
          # 错误校验
          if echo "$response" | grep -q -E '"error"|failed|error_code|timeout|refused'; then
            echo -e "\n❌ 任务失败"
            exit 1
          fi
          
          echo -e "\n✅ 任务完成：$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
